services:
  postgres-test:
    image: postgres:16-alpine
    container_name: personal-finance-db-test
    environment:
      POSTGRES_DB: personal_finance_test
      POSTGRES_USER: test
      POSTGRES_PASSWORD: test
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test -d personal_finance_test"]
      interval: 5s
      timeout: 3s
      retries: 5
    tmpfs:
      - /var/lib/postgresql/data
